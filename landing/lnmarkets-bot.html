    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      --white:   #FFFFFF;

      --red:     #FF1744;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);

      min-height: 100vh;
      overflow-x: hidden;

    /* ── Language switcher ── */
    #lang-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 1000;
      display: flex;
      gap: 4px;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 30px;
      padding: 5px 8px;
      backdrop-filter: blur(8px);
    }
    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.4rem;
      line-height: 1;
      padding: 2px;
      border-radius: 50%;
      transition: transform .15s, opacity .15s;
      opacity: .45;
    }
    .lang-btn:hover  { opacity: .85; transform: scale(1.15); }
    .lang-btn.active { opacity: 1; }

    /* ── Back link ── */
    .back-link {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 1000;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 30px;
      padding: 8px 16px;
      backdrop-filter: blur(8px);
      color: var(--orange);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      transition: opacity .15s;
    }
    .back-link:hover { opacity: .8; }

    /* ── Hero ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px 60px;
    }

    .logo-box {
      width: 88px; height: 88px;
      background: linear-gradient(135deg, #F7931A22, #F7931A44);
      border: 2px solid var(--orange);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem;
      margin-bottom: 24px;
      box-shadow: 0 0 40px #F7931A33;
    }

    .title {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 40%, var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      margin-bottom: 32px;
    }

    .badge {
      display: inline-block;
      background: rgba(247,147,26,0.12);
      border: 1px solid rgba(247,147,26,0.35);
      border-radius: 30px;
      padding: 6px 18px;
      font-size: 0.82rem;
      color: var(--orange);
      font-weight: 600;
      margin-bottom: 36px;
    }

    /* ── Download cards ── */
    .downloads {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .dl-card {
      background: var(--card-bg);
      border: 1px solid var(--card-br);
      border-radius: 18px;
      padding: 20px 24px;
      text-decoration: none;
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 160px;
      transition: border-color .2s, transform .2s;
    }
    .dl-card:hover {
      border-color: var(--orange);
      transform: translateY(-3px);
    }
    .dl-icon  { font-size: 2rem; }
    .dl-label { font-size: 0.72rem; color: var(--muted); }
    .dl-name  { font-size: 0.95rem; font-weight: 700; }
    .dl-btn {
      margin-top: 8px;
      background: var(--orange);
      color: #000;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    /* ── Warning box ── */
    .warning-box {
      max-width: 560px;
      margin: 0 auto 36px;
      background: rgba(255,23,68,0.07);
      border: 1px solid rgba(255,23,68,0.25);
      border-radius: 14px;
      padding: 16px 22px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.6;
      text-align: left;
    }
    .warning-box strong { color: #FF5252; }

    /* ── Pills ── */
    .pills { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 16px; }
    .pill {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Section ── */
    .section { padding: 80px 24px; max-width: 860px; margin: 0 auto; }
    .section-title {
      text-align: center;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      margin-bottom: 48px;
    }

    /* ── How it works cards ── */
    .hiw-grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
    .hiw-card {
      flex: 1 1 220px;
      max-width: 260px;
      background: var(--card-bg);
      border: 1px solid var(--card-br);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
    }
    .hiw-card .icon  { font-size: 2.4rem; margin-bottom: 16px; }
    .hiw-card h3     { font-weight: 700; margin-bottom: 8px; font-size: 0.95rem; }
    .hiw-card p      { color: var(--muted); font-size: 0.85rem; line-height: 1.55; }

    /* ── Features grid ── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 0;
    }
    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--card-br);
      border-radius: 16px;
      padding: 20px;
    }
    .feature-card .icon { font-size: 1.8rem; margin-bottom: 10px; }
    .feature-card h4    { font-size: 0.9rem; font-weight: 700; margin-bottom: 6px; }
    .feature-card p     { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }

    /* ── GitHub banner ── */
    .github-banner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(247,147,26,0.07);
      border: 1px solid rgba(247,147,26,0.25);
      border-radius: 14px;
      padding: 18px 24px;
      max-width: 500px;
      margin: 0 auto 48px;
      text-decoration: none;
      color: var(--white);
      font-size: 0.9rem;
      font-weight: 600;
      transition: border-color .2s;

    .github-banner:hover { border-color: var(--orange); }

      text-align: center;
      padding: 40px 24px;
      border-top: 1px solid var(--card-br);
      color: var(--muted);

      line-height: 1.8;

</head>

// ── Apply translations ────────────────────────────────────────────────────────
function applyLang(lang) {
  const t = T[lang] || T.pt;

  document.documentElement.lang = t.htmlLang;
  document.querySelector('meta[name="description"]').content = t.metaDesc;

  document.getElementById('t-back').textContent        = t.back;
  document.getElementById('t-subtitle').textContent    = t.subtitle;
  document.getElementById('t-warn-label').textContent  = t.warnLabel;
  document.getElementById('t-warn-body').textContent   = t.warnBody;

  for (let i = 0; i < 3; i++) {
    document.getElementById('t-dl-label-' + i).textContent = t.dlLabel[i];
    document.getElementById('t-dl-name-'  + i).textContent = t.dlName[i];
    document.getElementById('t-dl-btn-'   + i).textContent = t.dlBtn;
  }

  document.getElementById('pills-row').innerHTML =
    t.pills.map(p => `<span class="pill">${p}</span>`).join('');

  document.getElementById('t-hiw-title').textContent = t.hiwTitle;
  for (let i = 0; i < 3; i++) {
    document.getElementById('t-hiw' + i + '-title').textContent = t.hiw[i].title;
    document.getElementById('t-hiw' + i + '-body').textContent  = t.hiw[i].body;
  }

  document.getElementById('t-feat-title').textContent = t.featTitle;
  document.getElementById('features-grid').innerHTML = t.features.map(f => `
    <div class="feature-card">
      <div class="icon">${f.icon}</div>
      <h4>${f.title}</h4>
      <p>${f.body}</p>
    </div>
  `).join('');

  document.getElementById('t-strat-title').textContent = t.stratTitle;
  document.getElementById('t-strat-name').textContent  = t.stratName;
  document.getElementById('t-strat-body').textContent  = t.stratBody;

  document.getElementById('t-github-cta').textContent         = t.githubCta;
  document.getElementById('t-footer-releases').textContent    = t.footerReleases;
  document.getElementById('t-footer-dev').textContent         = t.footerDev;

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  localStorage.setItem('lnbot-lang', lang);
}

// ── Language detection ────────────────────────────────────────────────────────
function detectLang() {
  const saved = localStorage.getItem('lnbot-lang') || localStorage.getItem('bitfood-lang');
  if (saved && T[saved]) return saved;
  const b = (navigator.language || '').toLowerCase();
  if (b.startsWith('pt'))  return 'pt';
  if (b.startsWith('fr'))  return 'fr';
  if (b === 'gn' || b.startsWith('gn-')) return 'gn';
  if (b.startsWith('es'))  return 'es';
  return 'en';
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLang(btn.dataset.lang));
});

applyLang(detectLang());
</script>
