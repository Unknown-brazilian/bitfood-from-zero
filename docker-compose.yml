version: '3.9'

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - bitfood

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/bitfood
    depends_on:
      - mongo
    networks:
      - bitfood
    ports:
      - "127.0.0.1:4000:4000"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: https://api.bitfood.app/graphql
    depends_on:
      - backend
    networks:
      - bitfood
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  mongo_data:

networks:
  bitfood:
    driver: bridge
