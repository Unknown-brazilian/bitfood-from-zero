# ══════════════════════════════════════════════════════════════════
#  BitFood — Stack principal (API + Landing + MongoDB)
#
#  Requisitos: docker, docker compose v2
#  Setup:      bash deploy.sh
#
#  Não inclui:
#    - BTCPay Server  → btcpay/docker-compose.yml
#    - Painel Admin   → repositório privado
#    - Cloudflare Tunnel → gerenciado pelo deploy.sh (host service)
# ══════════════════════════════════════════════════════════════════

version: '3.9'

x-logging: &log
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

services:

  # ── MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7
    restart: unless-stopped
    logging: *log
    environment:
      MONGO_INITDB_ROOT_USERNAME: bitfood
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD nao definido no .env}
      MONGO_INITDB_DATABASE: bitfood
    volumes:
      - mongo_data:/data/db
    networks:
      - bitfood
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API GraphQL (Node.js + Apollo) ────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *log
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://bitfood:${MONGO_PASSWORD}@mongo:27017/bitfood?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - bitfood
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Landing page (bitfood.app) ────────────────────────────────
  landing:
    build:
      context: ./landing
      dockerfile: Dockerfile
    restart: unless-stopped
    logging: *log
    networks:
      - bitfood
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  mongo_data:
    driver: local

networks:
  bitfood:
    driver: bridge
