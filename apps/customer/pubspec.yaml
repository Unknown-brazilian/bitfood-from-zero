name: bitfood_customer
description: BitFood — Peça comida, pague com Bitcoin Lightning
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # GraphQL
  graphql_flutter: ^5.1.2

  # State management
  provider: ^6.1.1

  # Navigation
  go_router: ^12.1.3

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9

  # Payments
  webview_flutter: ^4.4.2
  qr_flutter: ^4.1.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
