name: bitfood_customer
description: BitFood — Peça comida, pague com Bitcoin Lightning
publish_to: 'none'
version: 1.2.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # GraphQL
  graphql_flutter: ^5.1.2

  # State management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # UI
  cached_network_image: ^3.3.0

  # Payments
  webview_flutter: ^4.4.2
  qr_flutter: ^4.1.0

  # Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  country_state_city: ^0.1.6

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  package_info_plus: ^8.0.0

flutter:
  uses-material-design: true
